<!DOCTYPE html>
<html>
<head>
<title>Mahendra Corp Login</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
/* MAIN */

.container{
display:flex;
width:95%;
max-width:1100px;
height:600px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

/* LEFT PANEL */

.left{
flex:1;
background:linear-gradient(135deg,#3b82f6,#1e40af);
display:flex;
align-items:center;
justify-content:center;
}

.left img{
width:80%;
max-width:420px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.slider{
position:relative;
width:80%;
max-width:420px;
}

.slide{
position:absolute;
width:100%;
opacity:0;
transition:opacity 1s ease-in-out;
}

.slide.active{
opacity:1;
}

/* RIGHT LOGIN */

.right{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:100%;
max-width:360px;
padding:40px;
border-radius:15px;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:80px;
}

.logo h2{
margin:10px 0 0;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
transition:.3s;
}

input:focus{
outline:none;
border-color:#2563eb;
}

/* REMEMBER + FORGOT */

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
font-size:13px;
}

.row a{
text-decoration:none;
color:#2563eb;
}

/* BUTTON */

button{
width:100%;
margin-top:25px;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1e40af;
transform:scale(1.03);
}

/* MOBILE */

@media(max-width:768px){

.container{
flex-direction:column;
}

.left{
height:35vh;
}

}

</style>
</head>

<body>

<div class="container">

<!-- LEFT IMAGE -->

<div class="left">

<div class="slider">
<img class="slide active" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<img class="slide" src="https://cdn-icons-png.flaticon.com/512/4149/4149645.png">
<img class="slide" src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png">
</div>

</div>

<!-- RIGHT LOGIN -->

<div class="right">

<div class="login-box">

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
<h2>Mahendra Corp</h2>
</div>

<form method="POST">

<input type="text" name="emp_id" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<div class="row">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">Next</button>

</form>

</div>

</div>

</div>

</body>
<script>
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>
</html>
